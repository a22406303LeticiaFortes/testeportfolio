{% extends "portfolioPWEB/base.html" %}

{% block content %}
<div class="delete-box">
    <h2>⚠️ Apagar Tecnologia</h2>
    <p>Tens a certeza que queres remover <strong>"{{ tecnologia.nome }}"</strong>?</p>
    <form method="POST" class="delete-form">
        {% csrf_token %}
        <button type="submit" class="btn-danger">Sim, apagar</button>
        <a href="{% url 'tecnologias' %}" class="btn-cancel">Cancelar</a>
    </form>
</div>
{% endblock %}
