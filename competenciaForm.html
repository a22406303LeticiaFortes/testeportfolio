{% extends "portfolioPWEB/base.html" %}

{% block content %}
<div class="form-page">
    <div class="page-header" style="margin-bottom: 32px;">
        <div>
            <span class="page-tag">Competências</span>
            <h2>{% if competencia %}Editar{% else %}Nova{% endif %} Competência</h2>
        </div>
        <a href="{% url 'competencias' %}" class="btn btn-outline">← Voltar</a>
    </div>
    <div class="form-card">
        <form method="POST" class="form-glass">
            {% csrf_token %}
            {{ form.as_p }}
            <div class="form-actions">
                <button type="submit" class="btn btn-primary">Guardar</button>
                <a href="{% url 'competencias' %}" class="btn-link">Cancelar</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
