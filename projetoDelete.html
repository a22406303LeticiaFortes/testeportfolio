{% extends "portfolioPWEB/base.html" %}

{% block content %}
<div class="delete-box">
    <h2>⚠️ Apagar Projeto</h2>
    <p>Tens a certeza que queres apagar o projeto <strong>"{{ projeto.titulo }}"</strong>? Esta ação é irreversível.</p>
    <form method="POST" class="delete-form">
        {% csrf_token %}
        <button type="submit" class="btn-danger">Sim, apagar</button>
        <a href="{% url 'projetos' %}" class="btn-cancel">Cancelar</a>
    </form>
</div>
{% endblock %}
